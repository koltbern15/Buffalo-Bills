name: Deploy to GitHub Pages

# Publishes the static site. Runs on pushes to main AND on a schedule, because
# the data-bot's snapshot commits are made with the Actions token and GitHub
# does not re-trigger workflows from those — so the scheduled run is what keeps
# the deployed data/*.json fresh on the live page.
on:
  push:
    branches: [main]
  schedule:
    - cron: '7,37 * * * *' # every 30 min, offset from the data refresh
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.retry.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Wait before retry
        if: steps.deployment.outcome == 'failure'
        run: sleep 30
      - id: retry
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
