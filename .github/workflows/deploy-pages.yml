name: Deploy to GitHub Pages

# Publishes the static site. Runs on pushes to main (including the data-bot's
# snapshot commits) so the live page always reflects the newest data.
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        # enablement turns Pages on for the repo automatically, so the deploy
        # works without first toggling Settings -> Pages -> Source: GitHub Actions.
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
